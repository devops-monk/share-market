name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Copy data to public
        run: |
          mkdir -p dashboard/public/data
          cp data/*.json dashboard/public/data/ 2>/dev/null || echo "No JSON data files yet"
          cp data/*.csv dashboard/public/data/ 2>/dev/null || echo "No CSV data files yet"
          cp -r data/charts dashboard/public/data/charts 2>/dev/null || echo "No chart data yet"

      - name: Create CNAME for custom domain
        run: echo "share.devops-monk.com" > dashboard/public/CNAME

      - name: Build dashboard
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
