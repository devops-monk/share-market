name: ETL Pipeline

on:
  schedule:
    - cron: '0 7-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: etl
  cancel-in-progress: true

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ETL pipeline
        timeout-minutes: 10
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm run etl

      - name: Check and send alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: npm run alerts
        continue-on-error: true

      - name: Archive daily snapshot
        run: |
          mkdir -p data/archive
          DATE=$(date -u +'%Y-%m-%d')
          cp data/latest.json "data/archive/${DATE}.json"
          # Keep only the last 90 days of archives
          find data/archive -name "*.json" -mtime +90 -delete 2>/dev/null || true

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ data/archive/
          git diff --staged --quiet || git commit -m "Update market data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push

  deploy:
    needs: etl
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
