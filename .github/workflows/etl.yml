name: ETL Pipeline

on:
  schedule:
    - cron: '0 7-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run ETL pipeline
        timeout-minutes: 10
        run: npm run etl

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update market data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push

  deploy:
    needs: etl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Copy data to public
        run: |
          mkdir -p dashboard/public/data
          cp data/*.json dashboard/public/data/ 2>/dev/null || echo "No JSON data files yet"
          cp data/*.csv dashboard/public/data/ 2>/dev/null || echo "No CSV data files yet"

      - name: Create CNAME for custom domain
        run: echo "share.devops-monk.com" > dashboard/public/CNAME

      - name: Build dashboard
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
